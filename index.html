<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>社内共有メモ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
    header { background: #fff; border-bottom: 1px solid #e5e5e3; padding: 0 1.5rem; height: 52px; display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .app-title { font-size: 15px; font-weight: 500; }
    .status { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; }
    .username-wrap { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #666; }
    .username-wrap input { font-size: 13px; border: 1px solid #ddd; border-radius: 6px; padding: 4px 8px; width: 110px; outline: none; }
    .username-wrap input:focus { border-color: #888; }
    .layout { display: grid; grid-template-columns: 220px 1fr; gap: 0; height: calc(100vh - 52px); }
    .sidebar { background: #fff; border-right: 1px solid #e5e5e3; display: flex; flex-direction: column; }
    .sidebar-header { padding: 12px 14px; border-bottom: 1px solid #e5e5e3; display: flex; align-items: center; justify-content: space-between; }
    .sidebar-label { font-size: 12px; font-weight: 500; color: #888; }
    .new-btn { font-size: 12px; padding: 4px 10px; border: 1px solid #ddd; border-radius: 6px; background: transparent; cursor: pointer; color: #333; }
    .new-btn:hover { background: #f5f5f3; }
    .note-list { flex: 1; overflow-y: auto; padding: 8px; }
    .note-item { padding: 9px 10px; border-radius: 8px; cursor: pointer; margin-bottom: 3px; border: 1px solid transparent; }
    .note-item:hover { background: #f5f5f3; }
    .note-item.active { background: #eeedfe; border-color: #afa9ec; }
    .note-item-title { font-size: 13px; font-weight: 500; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-item-meta { font-size: 11px; color: #999; margin-top: 2px; }
    .editor { display: flex; flex-direction: column; padding: 1.5rem; gap: 0; }
    .editor-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #bbb; font-size: 14px; }
    .title-input { font-size: 20px; font-weight: 500; border: none; outline: none; background: transparent; color: #1a1a1a; padding: 0 0 12px 0; border-bottom: 1px solid #e5e5e3; width: 100%; }
    .title-input::placeholder { color: #ccc; }
    .body-input { flex: 1; font-size: 14px; line-height: 1.8; border: none; outline: none; background: transparent; color: #1a1a1a; resize: none; padding: 14px 0; font-family: inherit; width: 100%; }
    .body-input::placeholder { color: #ccc; }
    .editor-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid #e5e5e3; }
    .footer-meta { font-size: 12px; color: #aaa; }
    .footer-btns { display: flex; gap: 8px; }
    .btn { font-size: 13px; padding: 6px 14px; border-radius: 7px; cursor: pointer; border: 1px solid #ddd; background: transparent; color: #333; }
    .btn:hover { background: #f5f5f3; }
    .btn-primary { background: #534AB7; color: #fff; border-color: #534AB7; }
    .btn-primary:hover { background: #3C3489; border-color: #3C3489; }
    .btn-danger { color: #A32D2D; border-color: #f7c1c1; }
    .btn-danger:hover { background: #fcebeb; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
    .toast.show { opacity: 1; }
    @media (max-width: 600px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { height: 200px; border-right: none; border-bottom: 1px solid #e5e5e3; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="app-title">社内共有メモ</div>
    <div class="status"><div class="dot"></div><span>同期中</span></div>
  </div>
  <div class="username-wrap">
    <span>名前：</span>
    <input id="username" type="text" placeholder="あなたの名前" value="" />
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-label">メモ一覧</span>
      <button class="new-btn" onclick="newNote()">+ 新規</button>
    </div>
    <div class="note-list" id="note-list"></div>
  </div>

  <div class="editor" id="editor">
    <div class="editor-empty" id="empty-state">メモを選択するか、新規作成してください</div>
    <div id="editor-content" style="display:none;flex-direction:column;flex:1;">
      <input class="title-input" id="note-title" type="text" placeholder="タイトル" />
      <textarea class="body-input" id="note-body" placeholder="内容を入力..."></textarea>
      <div class="editor-footer">
        <span class="footer-meta" id="note-meta"></span>
        <div class="footer-btns">
          <button class="btn btn-danger" onclick="deleteNote()">削除</button>
          <button class="btn btn-primary" onclick="saveNote()">保存して共有</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'sharedo-memo-notes';
  let notes = [];
  let currentId = null;

  function loadFromStorage() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      notes = raw ? JSON.parse(raw) : defaultNotes();
    } catch(e) {
      notes = defaultNotes();
    }
  }

  function saveToStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
  }

  function defaultNotes() {
    return [
      { id: 'n1', title: 'ミーティングメモ', body: '毎週月曜10時から。\nアジェンダは前日までに共有すること。', author: '山田', updatedAt: new Date().toISOString() },
      { id: 'n2', title: '社内ルール', body: '・リモートの場合はSlackのステータスを更新\n・議事録は共有フォルダへ保存', author: '佐藤', updatedAt: new Date().toISOString() },
    ];
  }

  function fmt(iso) {
    try {
      return new Date(iso).toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch(e) { return ''; }
  }

  function render() {
    const list = document.getElementById('note-list');
    list.innerHTML = '';
    notes.forEach(n => {
      const d = document.createElement('div');
      d.className = 'note-item' + (currentId === n.id ? ' active' : '');
      d.innerHTML = `<div class="note-item-title">${n.title || '(無題)'}</div><div class="note-item-meta">${n.author} · ${fmt(n.updatedAt)}</div>`;
      d.onclick = () => loadNote(n.id);
      list.appendChild(d);
    });
  }

  function loadNote(id) {
    currentId = id;
    const n = notes.find(x => x.id === id);
    if (!n) return;
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('editor-content').style.display = 'flex';
    document.getElementById('note-title').value = n.title || '';
    document.getElementById('note-body').value = n.body || '';
    document.getElementById('note-meta').textContent = `最終更新: ${n.author} · ${fmt(n.updatedAt)}`;
    render();
  }

  function newNote() {
    const id = 'n' + Date.now();
    const author = document.getElementById('username').value || '匿名';
    notes.unshift({ id, title: '新しいメモ', body: '', author, updatedAt: new Date().toISOString() });
    saveToStorage();
    loadNote(id);
  }

  function saveNote() {
    if (!currentId) return;
    const n = notes.find(x => x.id === currentId);
    if (!n) return;
    n.title = document.getElementById('note-title').value;
    n.body = document.getElementById('note-body').value;
    n.author = document.getElementById('username').value || '匿名';
    n.updatedAt = new Date().toISOString();
    document.getElementById('note-meta').textContent = `最終更新: ${n.author} · ${fmt(n.updatedAt)}`;
    saveToStorage();
    render();
    showToast('保存しました');
  }

  function deleteNote() {
    if (!currentId) return;
    if (!confirm('このメモを削除しますか？')) return;
    notes = notes.filter(x => x.id !== currentId);
    currentId = null;
    saveToStorage();
    document.getElementById('empty-state').style.display = 'flex';
    document.getElementById('editor-content').style.display = 'none';
    render();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  loadFromStorage();
  if (notes.length > 0) loadNote(notes[0].id);
  render();
</script>
</body>
</html>
